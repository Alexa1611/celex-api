services:
  - type: web
    name: celex-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: YUGABYTE_JDBC_URL
        sync: false
      - key: YUGABYTE_DB_USER
        sync: false
      - key: YUGABYTE_DB_PASSWORD
        sync: false
      - key: MAIL_ENABLED
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        value: CELEX_FALSO
